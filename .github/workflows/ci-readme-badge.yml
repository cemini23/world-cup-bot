# Keep README CI badge + text status in sync after every CI run.
# Static shields.io badge (not github/actions/workflow/status) — camo caches that
# endpoint red for hours after CI recovers.

name: Refresh README CI status

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: readme-ci-badge
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync-readme:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion != 'cancelled' &&
      github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Update README CI badge and status line
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            read -r CONCLUSION UPDATED_AT < <(
              gh run list --workflow=CI --branch=main --limit=1 \
                --json conclusion,updatedAt \
                -q '.[0] | "\(.conclusion) \(.updatedAt)"'
            )
          else
            CONCLUSION="${{ github.event.workflow_run.conclusion }}"
            UPDATED_AT="${{ github.event.workflow_run.updated_at }}"
          fi
          case "$CONCLUSION" in
            success) LABEL=passing ;;
            *) LABEL=failing ;;
          esac
          export LABEL UPDATED_AT
          python3 <<'PY'
          import os
          import re
          from datetime import UTC, datetime
          from pathlib import Path

          label = os.environ["LABEL"]
          ts = os.environ.get("UPDATED_AT", "").strip()
          if not ts:
              ts = datetime.now(UTC).strftime("%Y-%m-%dT%H:%M:%SZ")
          path = Path("README.md")
          text = path.read_text(encoding="utf-8")

          cache_bust = ts.replace(":", "").replace("-", "")
          color = "brightgreen" if label == "passing" else "red"
          badge = (
              "[![CI](https://img.shields.io/badge/CI-"
              f"{label}-{color}?logo=githubactions&logoColor=white&updated={cache_bust})]"
              "(https://github.com/cemini23/world-cup-bot/actions/workflows/ci.yml)"
          )
          text, n = re.subn(r"\[!\[CI\]\([^\]]+\)\]\([^\)]+\)", badge, text, count=1)
          if n != 1:
              raise SystemExit("README CI badge line not found")

          text, n = re.subn(
              r"\*\*CI:\*\* (?:passing|failing|see badge)",
              f"**CI:** {label}",
              text,
              count=1,
          )
          if n != 1:
              raise SystemExit("README **CI:** status line not found")

          marker = f"<!-- ci-badge-updated:{ts} -->"
          if "<!-- ci-badge-updated:" in text:
              text = re.sub(r"<!-- ci-badge-updated:[^>]* -->", marker, text, count=1)
          else:
              text = text.replace(badge + "\n", badge + "\n" + marker + "\n", 1)

          path.write_text(text, encoding="utf-8")
          print(f"README CI -> {label} @ {ts}")
          PY

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --staged --quiet; then
            echo "README already up to date"
            exit 0
          fi
          git commit -m "chore: sync README CI status [skip ci]"
          git pull --rebase origin main
          git push origin main
