# Tournament phases — market scanner + phase router FSM (DR 08 + DR 10)
# Bot v1 active LP: group_advance only until WC_PHASE_ROUTER_LP_GATE=1

version: 2

active_phase: group_advance

# Calendar anchors (FIFA 2026 48-team) — for phase router auto-detect (DR 10)
calendar:
  group_stage_end: "2026-06-27"
  round_of_32_start: "2026-06-28"
  round_of_16_start: "2026-07-04"
  quarterfinal_start: "2026-07-09"
  semifinal_start: "2026-07-14"
  final: "2026-07-19"

phases:
  group_advance:
    description: "Will {team} advance to knockout stages (= Reach Round of 32 in 48-team format)"
    gamma_search: "world cup advance knockout"
    title_regex: "^Will (.+?) advance to the knockout stages at the 2026 FIFA World Cup\\?$"
    resolution_class: milestone_elimination
    lp_eligible: true
    scanner_priority: 1
    conviction_config: config/conviction.yaml
    calendar_source: data/worldcup2026-fixtures.json
    status: active

  reach_round_of_16:
    description: "Nation to reach Round of 16 (post-R32 milestone)"
    gamma_search: "world cup reach round of 16"
    title_regex: "^Will (.+?) reach the (?:Round of 16|round of 16).*2026 FIFA World Cup"
    resolution_class: milestone_elimination
    lp_eligible: true
    scanner_priority: 2
    conviction_config: null
    status: research

  reach_quarterfinal:
    description: "Nation to reach World Cup quarterfinal"
    gamma_search: "world cup reach quarterfinal"
    title_regex: "^Will (.+?) reach the (?:Quarterfinal|quarterfinal).*2026 FIFA World Cup"
    resolution_class: milestone_elimination
    lp_eligible: true
    scanner_priority: 3
    conviction_config: null
    status: research

  reach_semifinal:
    description: "Nation to reach World Cup semifinal"
    gamma_search: "world cup reach semifinal"
    title_regex: "^Will (.+?) reach the (?:Semifinal|semifinal).*2026 FIFA World Cup"
    resolution_class: milestone_elimination
    lp_eligible: true
    scanner_priority: 4
    conviction_config: null
    status: research

  reach_final:
    description: "Nation to reach 2026 FIFA World Cup final"
    gamma_search: "world cup reach final"
    title_regex: "^Will (.+?) reach the 2026 FIFA World Cup final\\?$"
    resolution_class: milestone_elimination
    lp_eligible: true
    scanner_priority: 5
    conviction_config: null
    status: research

  knockout_match_90min:
    description: "Match winner at end of 90 minutes (Draw includes ET not played yet)"
    resolution_class: regulation_90
    lp_eligible: false
    status: out_of_scope_v1

  knockout_match_advance:
    description: "Team to advance in knockout tie (includes ET and penalties)"
    resolution_class: includes_et_pens
    lp_eligible: false
    status: research

  wc_winner:
    description: "2026 FIFA World Cup winner — resolves on elimination"
    resolution_class: immediate_no_on_ko_exit
    lp_eligible: false
    status: out_of_scope_v1

kalshi_cross_venue:
  stage_of_elimination:
    series: "KXWCSTAGEOFELIM"
    note: "Inverse of PM Reach markets — eliminated IN round X = Yes"
  match_game:
    series: "KXWCGAME"
  group_winner:
    series: "KXWCGROUPWINNER"

# Cancel-window overrides by phase (DR 09 — enforce in phase router, not v1 global)
cancel_hours_by_phase:
  group_advance: 10
  final_group_md3: 12
  knockout: 24

# Module 1b FSM — calendar windows are UTC; overlapping transition days pick last match
tournament_states:
  pre_tournament:
    calendar_start: "2026-05-01"
    calendar_end: "2026-06-11"
    scanner_phase_ids: [group_advance]
    lp_active_phases: [group_advance]
    operating_overrides:
      cancel_hours: 10
    cross_venue_enabled: true
    require_full_settlement_to_exit: false

  group_stage:
    calendar_start: "2026-06-11"
    calendar_end: "2026-06-27"
    scanner_phase_ids: [group_advance]
    lp_active_phases: [group_advance]
    operating_overrides:
      cancel_hours: 10
    cross_venue_enabled: true
    require_full_settlement_to_exit: false

  group_to_knockout_transition:
    calendar_start: "2026-06-27"
    calendar_end: "2026-06-28"
    scanner_phase_ids: [group_advance, reach_round_of_16]
    lp_active_phases: [group_advance]
    operating_overrides:
      cancel_hours: 12
    cross_venue_enabled: false
    require_full_settlement_to_exit: true

  round_of_32:
    calendar_start: "2026-06-28"
    calendar_end: "2026-07-04"
    scanner_phase_ids: [reach_round_of_16]
    lp_active_phases: [reach_round_of_16]
    operating_overrides:
      cancel_hours: 24
    cross_venue_enabled: true
    require_full_settlement_to_exit: true

  round_of_16:
    calendar_start: "2026-07-04"
    calendar_end: "2026-07-09"
    scanner_phase_ids: [reach_quarterfinal]
    lp_active_phases: [reach_quarterfinal]
    operating_overrides:
      cancel_hours: 24
    cross_venue_enabled: true
    require_full_settlement_to_exit: true

  quarterfinal:
    calendar_start: "2026-07-09"
    calendar_end: "2026-07-14"
    scanner_phase_ids: [reach_semifinal]
    lp_active_phases: [reach_semifinal]
    operating_overrides:
      cancel_hours: 24
    cross_venue_enabled: true
    require_full_settlement_to_exit: true

  semifinal:
    calendar_start: "2026-07-14"
    calendar_end: "2026-07-18"
    scanner_phase_ids: [reach_final]
    lp_active_phases: [reach_final]
    operating_overrides:
      cancel_hours: 24
    cross_venue_enabled: true
    require_full_settlement_to_exit: true

  third_place:
    calendar_start: "2026-07-18"
    calendar_end: "2026-07-19"
    scanner_phase_ids: [knockout_match_advance]
    lp_active_phases: []
    operating_overrides:
      cancel_hours: 24
    cross_venue_enabled: false
    require_full_settlement_to_exit: false

  final:
    calendar_start: "2026-07-18"
    calendar_end: "2026-07-20"
    scanner_phase_ids: [reach_final, wc_winner]
    lp_active_phases: []
    operating_overrides:
      cancel_hours: 24
    cross_venue_enabled: false
    require_full_settlement_to_exit: true

  post_tournament:
    calendar_start: "2026-07-20"
    calendar_end: "2027-01-01"
    scanner_phase_ids: []
    lp_active_phases: []
    operating_overrides:
      cancel_hours: 24
    cross_venue_enabled: false
    require_full_settlement_to_exit: false
