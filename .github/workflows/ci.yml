name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Ruff check
        run: ruff check world_cup_bot tests
      - name: Ruff format
        run: ruff format --check world_cup_bot tests
      - name: Threshold grep
        run: bash scripts/check_hardcoded_thresholds.sh
      - name: Pytest
        run: pytest -q
