<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>World Cup Bot</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #161a21;
      --panel-2: #1c2128;
      --border: #262c36;
      --text: #e6e9ef;
      --text-dim: #8b95a7;
      --accent: #7aa2f7;
      --accent-dim: #3d5a8c;
      --ok: #5bd17a;
      --bad: #ef6f6c;
      --warn: #e0af68;
      --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(122, 162, 247, 0.08), transparent),
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: auto, 48px 48px, 48px 48px;
      color: var(--text);
      font: 15px/1.5 -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: rgba(22, 26, 33, 0.92);
      backdrop-filter: blur(8px);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .brand { display: flex; align-items: center; gap: 12px; }
    .logo {
      width: 36px; height: 36px; border-radius: 10px;
      background: linear-gradient(135deg, var(--accent-dim), var(--accent));
      display: grid; place-items: center;
      font-size: 18px; font-weight: 700; color: #0f1115;
    }
    header h1 { margin: 0; font-size: 15px; font-weight: 600; letter-spacing: 0.01em; }
    header .sub { display: block; font-size: 12px; color: var(--text-dim); font-weight: 400; margin-top: 2px; }
    .status-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; font-size: 12px; }
    .pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 10px; border-radius: 999px;
      border: 1px solid var(--border); background: var(--panel-2); color: var(--text-dim);
    }
    .pill .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-dim); }
    .pill.ok .dot { background: var(--ok); }
    .pill.warn .dot { background: var(--warn); }
    .pill.bad .dot { background: var(--bad); }
    .pill.live { border-color: rgba(239, 111, 108, 0.5); color: var(--bad); }
    .pill.dry { border-color: rgba(91, 209, 122, 0.4); color: var(--ok); }
    .banner {
      padding: 10px 20px;
      background: rgba(61, 90, 140, 0.15);
      border-bottom: 1px solid var(--border);
      color: var(--text-dim);
      font-size: 13px;
    }
    nav {
      display: flex; gap: 6px; padding: 12px 20px 0;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      overflow-x: auto;
    }
    nav button {
      background: transparent; border: none; color: var(--text-dim);
      padding: 10px 14px 12px; cursor: pointer; font-size: 13px; font-weight: 500;
      border-bottom: 2px solid transparent; white-space: nowrap;
    }
    nav button:hover { color: var(--text); }
    nav button.active { color: var(--accent); border-bottom-color: var(--accent); }
    main { flex: 1; padding: 20px; max-width: 1100px; width: 100%; margin: 0 auto; }
    .toolbar {
      display: flex; gap: 10px; align-items: center; margin-bottom: 16px; flex-wrap: wrap;
    }
    .toolbar button {
      background: var(--accent); color: #0f1115; border: none;
      padding: 9px 14px; border-radius: 10px; font-weight: 600; font-size: 13px; cursor: pointer;
    }
    .toolbar button.secondary {
      background: var(--panel-2); color: var(--text);
      border: 1px solid var(--border);
    }
    .toolbar button:disabled { opacity: 0.5; cursor: wait; }
    .status-line { color: var(--text-dim); font-size: 12px; margin-left: auto; }
    .err {
      background: rgba(58, 31, 34, 0.9); border: 1px solid rgba(106, 42, 46, 0.8);
      color: #ffccd5; padding: 14px 16px; border-radius: 12px; margin-bottom: 16px;
      font-size: 13px; line-height: 1.5;
    }
    .err strong { color: #fff; display: block; margin-bottom: 6px; }
    .err code { background: rgba(0,0,0,0.25); padding: 2px 6px; border-radius: 4px; font-size: 12px; }
    .cards {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px; margin-bottom: 18px;
    }
    .card {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 16px;
    }
    .card .label { color: var(--text-dim); font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; }
    .card .value { font-size: 1.5rem; font-weight: 600; margin-top: 6px; font-variant-numeric: tabular-nums; }
    .card .value.small { font-size: 1rem; }
    .table-wrap {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th {
      text-align: left; padding: 10px 14px; color: var(--text-dim); font-weight: 500;
      background: var(--panel-2); border-bottom: 1px solid var(--border);
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em;
    }
    td { padding: 10px 14px; border-bottom: 1px solid var(--border); }
    tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: rgba(122, 162, 247, 0.04); }
    .num { font-family: var(--mono); font-variant-numeric: tabular-nums; }
    .tag {
      display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: 600;
    }
    .tag.yes { background: rgba(91, 209, 122, 0.15); color: var(--ok); }
    .tag.no { background: rgba(239, 111, 108, 0.12); color: var(--bad); }
    .empty {
      text-align: center; padding: 48px 24px; color: var(--text-dim);
      background: var(--panel); border: 1px dashed var(--border); border-radius: 12px;
    }
    .empty h3 { margin: 0 0 8px; color: var(--text); font-size: 15px; font-weight: 600; }
    pre {
      background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
      padding: 16px; overflow: auto; max-height: 52vh; font-size: 12px;
      font-family: var(--mono); line-height: 1.45;
    }
    .panel { display: none; animation: fade 0.2s ease; }
    .panel.active { display: block; }
    @keyframes fade { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
    footer {
      border-top: 1px solid var(--border); padding: 12px 20px;
      color: var(--text-dim); font-size: 11px; text-align: center;
      background: var(--panel);
    }
    .advisor-note {
      color: var(--text-dim); font-size: 13px; margin-bottom: 12px; line-height: 1.5;
    }
    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle;
    }
    .step-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 18px; }
    .step {
      background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
      padding: 14px 16px; display: grid; grid-template-columns: auto 1fr; gap: 12px; align-items: start;
    }
    .step .phase {
      font-size: 11px; font-weight: 700; color: var(--accent); background: rgba(122,162,247,0.12);
      padding: 4px 8px; border-radius: 6px; white-space: nowrap;
    }
    .step.done { border-color: rgba(91, 209, 122, 0.35); }
    .step.warn { border-color: rgba(224, 175, 104, 0.4); }
    .step.blocked { border-color: rgba(239, 111, 108, 0.35); }
    .step h4 { margin: 0 0 4px; font-size: 14px; }
    .step p { margin: 0; color: var(--text-dim); font-size: 13px; line-height: 1.45; }
    .step code { font-family: var(--mono); font-size: 11px; color: var(--accent); }
    .check-row {
      display: flex; gap: 10px; align-items: flex-start; padding: 10px 12px;
      border-bottom: 1px solid var(--border); font-size: 13px;
    }
    .check-row:last-child { border-bottom: none; }
    .check-badge {
      font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em;
      padding: 3px 7px; border-radius: 6px; min-width: 42px; text-align: center;
    }
    .check-badge.pass { background: rgba(91,209,122,0.15); color: var(--ok); }
    .check-badge.warn { background: rgba(224,175,104,0.15); color: var(--warn); }
    .check-badge.fail { background: rgba(239,111,108,0.15); color: var(--bad); }
    .check-badge.skip { background: var(--panel-2); color: var(--text-dim); }
    .doc-link { color: var(--accent); text-decoration: none; }
    .doc-link:hover { text-decoration: underline; }
</head>
<body>
  <header>
    <div class="brand">
      <div class="logo" aria-hidden="true">WC</div>
      <div>
        <h1>World Cup Bot</h1>
        <span class="sub">FIFA 2026 LP + Module 8 match-shock · read-only dashboard</span>
      </div>
    </div>
    <div class="status-row">
      <span class="pill" id="pill-version"><span class="dot"></span><span id="version-text">…</span></span>
      <span class="pill" id="pill-shock"><span class="dot"></span><span id="shock-text">shock off</span></span>
      <span class="pill dry" id="pill-dry"><span class="dot"></span><span id="dry-text">DRY RUN</span></span>
      <span class="pill" id="pill-advisor"><span class="dot"></span><span id="advisor-text">advisor off</span></span>
    </div>
  </header>
  <p class="banner">
    Shadow / read-only — refresh pulls live Gamma mids. Orders are never posted from this page.
    Shadow checklist — see <a class="doc-link" href="https://github.com/cemini23/world-cup-bot/blob/main/SHADOW.md" target="_blank" rel="noopener">SHADOW.md</a>.
    CLI: <code style="color:var(--accent)">world-cup-bot preflight</code> ·
    <code style="color:var(--accent)">plan --record</code> ·
    <code style="color:var(--accent)">match-shock-discover</code>.
    Module 8 is paper-first — see <code>docs/MATCH_SHOCK_V1.md</code>.
  </p>

  <nav id="tabs">
    <button type="button" data-tab="ready" class="active">Ready</button>
    <button type="button" data-tab="markets">Markets</button>
    <button type="button" data-tab="plan">Plan</button>
    <button type="button" data-tab="calendar">Calendar</button>
    <button type="button" data-tab="pnl">PnL</button>
    <button type="button" data-tab="match-shock">Match shock</button>
    <button type="button" data-tab="advisor">Advisor</button>
  </nav>

  <main>
    <div class="toolbar">
      <button type="button" id="refresh-btn">Refresh</button>
      <button type="button" id="refresh-all-btn" class="secondary">Refresh all</button>
      <span class="status-line" id="status"><span class="spinner"></span> Loading…</span>
    </div>
    <div id="error" class="err" style="display:none"></div>

    <section id="panel-ready" class="panel active">
      <div class="cards" id="ready-cards"></div>
      <div class="step-list" id="ready-steps"></div>
      <div class="table-wrap">
        <div id="preflight-checks"></div>
      </div>
      <p style="color:var(--text-dim);font-size:13px;margin-top:14px">
        Full phases: <code>SHADOW.md</code> in repo root. Geoblock WARN from US is OK while <code>DRY_RUN=true</code>.
      </p>
    </section>

    <section id="panel-markets" class="panel">
      <div class="cards" id="markets-cards"></div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Team</th><th>Mid</th><th>Spread</th><th>Hrs</th><th>Mode</th>
              <th>Quote</th><th>LP</th><th>Reason</th>
            </tr>
          </thead>
          <tbody id="markets-body"></tbody>
        </table>
      </div>
      <div id="markets-empty" class="empty" style="display:none;margin-top:12px">
        <h3>No markets loaded</h3>
        <p>Gamma returned nothing or the request failed. Check the error above or run
          <code>world-cup-bot scan</code> in a terminal.</p>
      </div>
    </section>

    <section id="panel-plan" class="panel">
      <div class="cards" id="plan-cards"></div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Team</th><th>Side</th><th>Price</th><th>Shares</th><th>USD</th><th>Reason</th></tr></thead>
          <tbody id="plan-body"></tbody>
        </table>
      </div>
    </section>

    <section id="panel-calendar" class="panel">
      <div class="cards" id="calendar-cards"></div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Team</th><th>Hours to kickoff</th></tr></thead>
          <tbody id="calendar-body"></tbody>
        </table>
      </div>
    </section>

    <section id="panel-pnl" class="panel">
      <div class="cards" id="pnl-cards"></div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Version</th><th>Rows</th><th>Fills</th><th>Net USD</th></tr></thead>
          <tbody id="pnl-body"></tbody>
        </table>
      </div>
    </section>

    <section id="panel-match-shock" class="panel">
      <p class="advisor-note">
        Module 8 — in-play match-market shock recovery (<code>wc_match_shock_v1</code>).
        Discovery uses Gamma public-search; export/record run from CLI only.
        Disabled unless <code>config/shock_match.yaml</code> and <code>WC_SHOCK_ENABLED=1</code>.
      </p>
      <div class="cards" id="shock-cards"></div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>Slug</th><th>Question</th><th>Orders</th></tr>
          </thead>
          <tbody id="shock-body"></tbody>
        </table>
      </div>
      <div id="shock-empty" class="empty" style="display:none;margin-top:12px">
        <h3>No match markets discovered</h3>
        <p>Run <code>world-cup-bot match-shock-discover</code> in a terminal.</p>
      </div>
      <p style="color:var(--text-dim);font-size:12px;margin-top:14px" id="shock-cli"></p>
    </section>

    <section id="panel-advisor" class="panel">
      <p class="advisor-note">
        Copy JSON into Claude, ChatGPT, Cursor, or Ollama with <code>prompts/advisor.md</code>.
        In-process advisor: set <code>ADVISOR_BASE_URL</code> then <code>world-cup-bot plan --advisor</code>.
      </p>
      <button type="button" id="copy-advisor" class="secondary" style="margin-bottom:12px;padding:9px 14px;border-radius:10px;border:1px solid var(--border);background:var(--panel-2);color:var(--text);cursor:pointer;font-weight:600">Copy JSON</button>
      <pre id="advisor-pre">Loading…</pre>
    </section>
  </main>

  <footer id="footer-meta">localhost · optional UI · no API keys required</footer>

  <script>
    let activeTab = "ready";
    let busy = false;

    function fmt(v, d = 3) {
      if (v === null || v === undefined) return "—";
      if (typeof v === "number") return v.toFixed(d);
      return String(v);
    }

    function tag(b, yesLabel = "yes", noLabel = "no") {
      return b
        ? `<span class="tag yes">${yesLabel}</span>`
        : `<span class="tag no">${noLabel}</span>`;
    }

    function card(label, value, small = false) {
      return `<div class="card"><div class="label">${label}</div><div class="value${small ? " small" : ""}">${value}</div></div>`;
    }

    function showError(title, detail, hint) {
      const el = document.getElementById("error");
      if (!title) { el.style.display = "none"; el.innerHTML = ""; return; }
      el.style.display = "block";
      el.innerHTML = `<strong>${title}</strong>${detail ? `<div>${detail}</div>` : ""}${hint ? `<div style="margin-top:8px;color:#ffb4c4">${hint}</div>` : ""}`;
    }

    async function fetchJson(path) {
      const res = await fetch(path);
      const data = await res.json();
      if (!res.ok) throw { detail: data.detail || data.error, hint: data.hint };
      return data;
    }

    async function loadMeta() {
      const m = await fetchJson("/api/meta");
      document.getElementById("version-text").textContent = m.logic_version;
      const dryPill = document.getElementById("pill-dry");
      document.getElementById("dry-text").textContent = m.dry_run ? "DRY RUN" : "LIVE";
      dryPill.className = "pill " + (m.dry_run ? "dry" : "live bad");
      const advPill = document.getElementById("pill-advisor");
      document.getElementById("advisor-text").textContent = m.advisor_configured ? "advisor ready" : "advisor off";
      advPill.classList.toggle("ok", m.advisor_configured);
      const shockPill = document.getElementById("pill-shock");
      const shockOn = m.match_shock_enabled;
      document.getElementById("shock-text").textContent = shockOn ? "shock on" : "shock off";
      shockPill.className = "pill " + (shockOn ? "ok" : "");
      document.getElementById("footer-meta").textContent =
        `localhost · ${m.logic_version} · ${m.match_shock_version} · ${m.dry_run ? "shadow" : "live mode"}`;
    }

    async function loadReady() {
      const d = await fetchJson("/api/ready");
      const pfOk = d.preflight_ok ? "PASS" : "CHECK";
      document.getElementById("ready-cards").innerHTML =
        card("Shadow progress", d.shadow_progress) +
        card("Preflight", pfOk, true) +
        card("Quote intents", d.ledger.quote_intents || 0) +
        card("Plan days", d.ledger.distinct_days || 0);
      document.getElementById("ready-steps").innerHTML = d.shadow_steps.map(s => `
        <div class="step ${s.status}">
          <div class="phase">P${s.phase}</div>
          <div>
            <h4>${s.title}</h4>
            <p>${s.detail}</p>
            ${s.cli ? `<p style="margin-top:8px"><code>${s.cli}</code></p>` : ""}
          </div>
        </div>`).join("");
      document.getElementById("preflight-checks").innerHTML = d.preflight_checks.map(c => `
        <div class="check-row">
          <span class="check-badge ${c.status}">${c.status}</span>
          <div><strong>${c.name}</strong><div style="color:var(--text-dim);margin-top:2px">${c.detail}</div></div>
        </div>`).join("");
    }

    async function loadMarkets() {
      const d = await fetchJson("/api/markets");
      let summary = null;
      try { summary = await fetchJson("/api/conviction/summary"); } catch (_) {}
      const gb = summary && summary.group_b && summary.group_b.length
        ? card("Group B", summary.group_b.length, true) : "";
      document.getElementById("markets-cards").innerHTML =
        card("Markets", d.count) + card("LP filter", d.eligible_only ? "on" : "off", true) + gb;
      const tbody = document.getElementById("markets-body");
      const empty = document.getElementById("markets-empty");
      if (!d.markets.length) {
        tbody.innerHTML = "";
        empty.style.display = "block";
        return;
      }
      empty.style.display = "none";
      tbody.innerHTML = d.markets.map(r => `<tr>
        <td><strong>${r.team}</strong></td>
        <td class="num">${fmt(r.mid)}</td><td class="num">${fmt(r.spread)}</td>
        <td class="num">${fmt(r.hours_to_kickoff, 1)}</td>
        <td>${r.mode.replace(/_/g, " ")}</td>
        <td>${tag(r.quote)}</td><td>${tag(r.lp_eligible)}</td>
        <td style="color:var(--text-dim);max-width:220px">${r.reason}</td>
      </tr>`).join("");
    }

    async function loadPlan() {
      const d = await fetchJson("/api/plan");
      document.getElementById("plan-cards").innerHTML =
        card("Quote intents", d.intent_count) + card("Conviction rows", d.conviction_rows);
      document.getElementById("plan-body").innerHTML = d.intents.length
        ? d.intents.map(i => `<tr>
          <td><strong>${i.team}</strong></td><td>${i.side}</td>
          <td class="num">${fmt(i.price, 2)}</td><td class="num">${fmt(i.size_shares, 1)}</td>
          <td class="num">${Math.round(i.notional_usd)}</td>
          <td style="color:var(--text-dim)">${i.reason}</td></tr>`).join("")
        : `<tr><td colspan="6" style="color:var(--text-dim);text-align:center;padding:24px">No quote intents — conviction gate or empty Gamma book</td></tr>`;
    }

    async function loadCalendar() {
      const d = await fetchJson("/api/calendar");
      document.getElementById("calendar-cards").innerHTML =
        card("Cancel window", d.cancel_window_count) + card("Threshold (h)", d.min_hours_before_kickoff);
      document.getElementById("calendar-body").innerHTML = d.cancel_window.length
        ? d.cancel_window.map(r => `<tr><td><strong>${r.team}</strong></td><td class="num">${r.hours_to_kickoff}h</td></tr>`).join("")
        : `<tr><td colspan="2" style="color:var(--text-dim);text-align:center;padding:24px">No teams inside cancel window — good for quoting</td></tr>`;
    }

    async function loadPnl() {
      const d = await fetchJson("/api/pnl");
      if (d.empty) {
        document.getElementById("pnl-cards").innerHTML = card("Ledger", "empty", true);
        document.getElementById("pnl-body").innerHTML =
          `<tr><td colspan="4" style="color:var(--text-dim);text-align:center;padding:24px">No ledger yet — run <code>world-cup-bot plan --record</code></td></tr>`;
        return;
      }
      const s = d.summary;
      const netClass = s.net_pnl_usd >= 0 ? "var(--ok)" : "var(--bad)";
      document.getElementById("pnl-cards").innerHTML =
        card("Net PnL", `<span style="color:${netClass}">$${s.net_pnl_usd.toFixed(2)}</span>`) +
        card("Fills", s.fills) + card("Rows", s.row_count);
      document.getElementById("pnl-body").innerHTML = d.by_version.map(v => `<tr>
        <td class="num">${v.logic_version}</td><td class="num">${v.row_count}</td>
        <td class="num">${v.fills}</td><td class="num">${v.net_pnl_usd.toFixed(2)}</td></tr>`).join("");
    }

    async function loadMatchShock() {
      const d = await fetchJson("/api/match-shock");
      document.getElementById("shock-cards").innerHTML =
        card("Match markets", d.market_count) +
        card("Open", d.open_count) +
        card("WC 2026 slugs", d.wc_2026_count) +
        card("Local tape lines", d.tape.lines, true);
      const tbody = document.getElementById("shock-body");
      const empty = document.getElementById("shock-empty");
      if (!d.markets.length) {
        tbody.innerHTML = "";
        empty.style.display = "block";
      } else {
        empty.style.display = "none";
        tbody.innerHTML = d.markets.map(r => `<tr>
          <td style="font-family:var(--mono);font-size:11px;max-width:200px;word-break:break-all">${r.slug}</td>
          <td style="color:var(--text-dim);max-width:280px">${r.question}</td>
          <td>${tag(r.accepting_orders, "open", "closed")}</td>
        </tr>`).join("");
      }
      const status = d.active ? "active" : (d.yaml_enabled ? "yaml on, env off" : "disabled");
      document.getElementById("shock-cli").innerHTML =
        `Status: <strong>${status}</strong> · tape dir: <code>${d.tape.path}</code> · ` +
        `CLI: <code>${d.cli.discover}</code>`;
    }

    async function loadAdvisor() {
      const d = await fetchJson("/api/advisor/context");
      document.getElementById("advisor-pre").textContent = JSON.stringify(d.context, null, 2);
    }

    const loaders = {
      ready: loadReady, markets: loadMarkets, plan: loadPlan, calendar: loadCalendar,
      pnl: loadPnl, "match-shock": loadMatchShock, advisor: loadAdvisor,
    };

    async function refreshTab(tab) {
      if (busy) return;
      busy = true;
      document.getElementById("refresh-btn").disabled = true;
      document.getElementById("status").innerHTML = '<span class="spinner"></span> Loading ' + tab + "…";
      showError("");
      try {
        await loaders[tab]();
        document.getElementById("status").textContent = "Updated " + new Date().toLocaleTimeString();
      } catch (e) {
        const hint = e.hint || (typeof e === "object" && e.hint);
        const detail = e.detail || e.message || String(e);
        showError("Could not load " + tab, detail, hint);
        document.getElementById("status").textContent = "Error";
      } finally {
        busy = false;
        document.getElementById("refresh-btn").disabled = false;
      }
    }

    document.getElementById("tabs").addEventListener("click", (e) => {
      const btn = e.target.closest("button[data-tab]");
      if (!btn) return;
      activeTab = btn.dataset.tab;
      document.querySelectorAll("#tabs button").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
      document.getElementById("panel-" + activeTab).classList.add("active");
      refreshTab(activeTab);
    });

    document.getElementById("refresh-btn").addEventListener("click", () => refreshTab(activeTab));
    document.getElementById("refresh-all-btn").addEventListener("click", async () => {
      for (const t of Object.keys(loaders)) await refreshTab(t);
    });
    document.getElementById("copy-advisor").addEventListener("click", async () => {
      await navigator.clipboard.writeText(document.getElementById("advisor-pre").textContent);
      document.getElementById("status").textContent = "Advisor JSON copied";
    });

    (async () => {
      try {
        await loadMeta();
        await refreshTab("ready");
      } catch (e) {
        showError("Startup failed", e.detail || e.message, e.hint);
      }
    })();
  </script>
</body>
</html>
