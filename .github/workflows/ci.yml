name: CI

on:
  push:
    branches: [main]
  pull_request:

# Skip re-run when README-only bot commit from ci-readme-badge workflow
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Ruff check
        run: ruff check world_cup_bot tests
      - name: Ruff format
        run: ruff format --check world_cup_bot tests
      - name: Threshold grep
        run: python scripts/check_hardcoded_thresholds.py
      - name: Pytest
        run: pytest -q

  secrets:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: TruffleHog verified secrets
        uses: trufflesecurity/trufflehog@v3.82.13
        with:
          extra_args: --only-verified

  docs-audit:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install vet
        run: pip install "git+https://github.com/cemini23/vet.git"
      - name: vet operator docs (minimal profile)
        run: |
          # minimal profile scores ~55/100 when all checks pass — WARN is OK; REJECT (exit ≥2) fails CI
          set +e
          for f in SHADOW.md SETUP.md ROADMAP.md; do
            vet "$f" --profile minimal
            r=$?
            if [ "$r" -ge 2 ]; then exit "$r"; fi
          done
