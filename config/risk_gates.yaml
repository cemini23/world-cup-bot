# Module 7 — streak sizing + portfolio PnL gates (K102)
# ON by default. Live bankroll = PM wallet (free USDC + open BUY lock) unless WC_BANKROLL_USD set.
# Shadow/DRY_RUN: streak sizing active; portfolio % gates defer until live (see portfolio_gates.py).
# Complements operating.yaml risk.max_daily_adverse_fill_usd (absolute USD cap).

version: 1
logic_version: wc_risk_gates_v1

dynamic_sizing:
  enabled: true
  loss_reduction_pct: 0.20
  loss_streak_threshold: 2
  win_increase_pct: 0.10
  win_streak_threshold: 3
  win_streak_cap: 5
  min_size_multiplier: 0.25
  max_size_multiplier: 1.25

portfolio_gates:
  enabled: true
  # Bankroll: live PM USDC + open BUY collateral (WC_BANKROLL_FROM_WALLET, default on) or WC_BANKROLL_USD override.
  daily_loss_pct: 0.05
  daily_pause_minutes: 60
  monthly_loss_pct: 0.15
  monthly_pause_days: 30
  peak_drawdown_pct: 0.25
  peak_pause_days: 7
  total_loss_pct: 0.40
