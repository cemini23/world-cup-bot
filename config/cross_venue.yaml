# Module 6 — cross-venue PM↔Kalshi config (scan + paper + optional gated exec)
# Source: Gemini DR + live discover cohort triage (2026-05-29)
# Semantic note: ONLY group-winner pairs with rules_hash match. Advance-to-knockout
# PM slugs TBD — do NOT pair KXWCGROUPQUAL vs PM advance until rules hash matches.
# Bosnia fade_watch: SKIP until PM posts non-playoff group-winner slug.

version: 1
alert_threshold_pp: 5.0
poll_interval_sec: 120
fee_kalshi_profit_pct: 7.0
verification_max_age_days: 14  # pairs with stale last_verified auto-block alerts

# Phase A paper arb ledger — cross-venue-scan --record (no live POST unless Phase C env set)
paper_arb:
  default_notional_usd: 500
  dedup_interval_sec: 3600
  min_fee_adjusted_gap_pp: 0.5

# Phase C auto dual-leg — requires WC_CROSS_VENUE_AUTO_EXEC=1, DRY_RUN=false, WC_CROSS_VENUE_EXEC_ACK=1
auto_arb:
  max_notional_usd: 100
  max_daily_notional_usd: 500
  max_open_arbs: 3
  kalshi_first: true
  min_fee_adjusted_gap_pp: 0.5
  slippage_buffer_pp: 0.25

